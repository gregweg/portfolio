<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Greg Wegman's Blog - Technical insights and personal reflections">
    <title>Blog - Greg Wegman</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="../index.html" class="logo">Greg Wegman</a>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../projects.html">Projects</a></li>
                <li><a href="../hobbies.html">Hobbies</a></li>
                <li><a href="index.html" class="active">Blog</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <section class="page-header">
            <div class="container">
                <h1 class="page-title">Engineering Log</h1>
                <p class="page-description">A chronological feed of deep dives, notes, and technical updates</p>
            </div>
        </section>

        <section class="blog-section">
            <div class="container">
                <div class="timeline-feed" id="timeline">
                    <!-- Entries injected by JS -->
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Greg Wegman. All rights reserved.</p>
        </div>
    </footer>

    <script src="posts.js"></script>
    <script>
        function formatMonthYear(dateStr) {
            const [year, month] = dateStr.split('-').map(Number);
            return new Date(year, month - 1, 1).toLocaleDateString('en-US', {
                year: 'numeric', month: 'long'
            });
        }

        function formatShortDate(dateStr) {
            const [year, month, day] = dateStr.split('-').map(Number);
            return new Date(year, month - 1, day).toLocaleDateString('en-US', {
                month: 'short', day: 'numeric'
            });
        }

        const timeline = document.getElementById('timeline');
        let currentMonthKey = null;

        BLOG_POSTS.forEach(post => {
            const monthKey = post.date.slice(0, 7);
            const href = post.slug + '.html';

            if (monthKey !== currentMonthKey) {
                currentMonthKey = monthKey;
                const label = document.createElement('div');
                label.className = 'timeline-month-label';
                label.textContent = formatMonthYear(post.date);
                timeline.appendChild(label);
            }

            const entry = document.createElement('div');
            entry.className = 'timeline-entry';
            entry.innerHTML = `
                <span class="timeline-dot"></span>
                <div class="timeline-content">
                    <div class="timeline-meta">
                        <span class="timeline-date">${formatShortDate(post.date)}</span>
                        <div class="timeline-tags">${post.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                    </div>
                    <h2 class="timeline-title"><a href="${href}">${post.title}</a></h2>
                    <p class="timeline-description">${post.description}</p>
                    <a href="${href}" class="timeline-read-more">Read more <i class="fas fa-arrow-right"></i></a>
                </div>
            `;
            timeline.appendChild(entry);
        });
    </script>
</body>
</html>
